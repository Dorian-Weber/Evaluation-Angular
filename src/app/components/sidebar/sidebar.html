<div class="sidebar">
  <div class="card bg-base-200 shadow-xl">
    <div class="card-body">
      <h2 class="card-title">Lettres jouées</h2>
      <div class="text-center">
        <p class="hint-text">Tapez une lettre au clavier</p>
        <div id="letters-used" class="letters-container">
          @for (letter of gameService.getLettersList$(); track $index){
              <span class="badge badge-lg" [ngClass]="{
              'badge-success':gameService.isIncluded(letter),
              'badge-error':!gameService.isIncluded(letter) }">{{ letter }}</span>
          }
        </div>
      </div>
    </div>
  </div>

  <div class="card bg-base-200 shadow-xl">
    <div class="card-body">
      <h2 class="card-title">Actions</h2>
      <button class="btn btn-primary btn-block" (click)="gameService.resetGame()">Nouvelle Partie</button>
      <button class="btn btn-outline btn-block">Historique des parties</button>
    </div>
  </div>
</div>
