<div class="word-container">
  <div id="word-display" class="word-display">
    @for (letter of gameService.getCurrentWord(); track $index) {
      @if (gameService.isIncluded(letter)) {
        <span>{{ letter }}</span>
      } @else {
        <span class="letter-placeholder"></span>
      }
    }

  </div>
</div>
